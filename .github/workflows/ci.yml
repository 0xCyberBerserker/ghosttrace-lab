name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GHOSTTRACE_TMP_DATA: ${{ github.workspace }}/.tmp-data
      JOB_METADATA_PATH: ${{ env.GHOSTTRACE_TMP_DATA }}/job_metadata.json
      UPLOADS_DIR: ${{ env.GHOSTTRACE_TMP_DATA }}/uploads
      DYNAMIC_EVIDENCE_DIR: ${{ env.GHOSTTRACE_TMP_DATA }}/dynamic_evidence
      TRIAGE_REPORT_DIR: ${{ env.GHOSTTRACE_TMP_DATA }}/triage_reports
      JOB_STORE_DB_PATH: ${{ env.GHOSTTRACE_TMP_DATA }}/ghosttrace.db
      WINDOWS_SANDBOX_CREDENTIALS_PATH: ${{ env.GHOSTTRACE_TMP_DATA }}/windows-sandbox.env

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate E2E scripts syntax
        run: |
          node --check scripts/run_e2e_smoke.mjs
          node --check scripts/check_e2e_report.mjs

      - name: Compile Python modules
        run: python -m compileall webui sandbox/runner

      - name: Run Web UI tests
        run: python -m unittest discover -s webui/tests -p "test_*.py" -v

      - name: Run sandbox runner tests
        run: python -m unittest discover -s sandbox/runner/tests -p "test_*.py" -v
