  <text x="700" y="218" fill="#FF70E1" font-family="'IBM Plex Mono', monospace" font-size="18">[static]</text>
  <text x="792" y="218" fill="#DDFBFF" font-family="'IBM Plex Mono', monospace" font-size="18">Installer-like PE with updater, registry and telemetry clues</text>

  <text x="700" y="262" fill="#47F5FF" font-family="'IBM Plex Mono', monospace" font-size="18">[dynamic]</text>
  <text x="804" y="262" fill="#DDFBFF" font-family="'IBM Plex Mono', monospace" font-size="18">Windows sandbox bridge reports debugger state and findings</text>

  <text x="700" y="306" fill="#A6FF47" font-family="'IBM Plex Mono', monospace" font-size="18">[next]</text>
  <text x="785" y="306" fill="#DDFBFF" font-family="'IBM Plex Mono', monospace" font-size="18">Decompile priority functions and trace API-heavy paths</text>

  <rect x="670" y="460" width="492" height="140" rx="22" fill="#070E1C" stroke="#FF4FD8" stroke-opacity="0.18"/>
  <text x="700" y="496" fill="#FFCF5A" font-family="'IBM Plex Mono', monospace" font-size="14" letter-spacing="2.2">X64DBG BRIDGE</text>
  <text x="700" y="538" fill="#F7FCFF" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700">Debugger-aware by design.</text>
  <text x="700" y="574" fill="#8EAFC0" font-family="'Space Grotesk', sans-serif" font-size="21">Queue requests from the web UI, sync findings from the VM,</text>
  <text x="700" y="604" fill="#8EAFC0" font-family="'Space Grotesk', sans-serif" font-size="21">and keep static and dynamic evidence in one operator flow.</text>

