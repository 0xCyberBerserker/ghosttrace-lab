    GhostTrace
  </text>
  <text x="100" y="280" fill="#89AFC0" font-family="'Space Grotesk', sans-serif" font-size="28">
    AI reverse engineering workbench for static triage,
  </text>
  <text x="100" y="318" fill="#89AFC0" font-family="'Space Grotesk', sans-serif" font-size="28">
    guided decompilation, and sandbox-assisted workflows.
  </text>

  <g fill="#D8F9FF" font-family="'Space Grotesk', sans-serif" font-size="24">
    <text x="100" y="402">- Ghidraaas backend with cached imports, strings, functions and decompilation</text>
