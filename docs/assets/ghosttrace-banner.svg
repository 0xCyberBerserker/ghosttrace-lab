  <text x="720" y="418" fill="#FFC95F" font-family="Consolas, 'Courier New', monospace" font-size="14" letter-spacing="2.0">DEBUGGER SURFACE</text>
  <text x="720" y="468" fill="#F5FCFF" font-family="'Segoe UI', Arial, sans-serif" font-size="31" font-weight="700">One workspace for static and dynamic evidence.</text>
  <text x="720" y="510" fill="#8FB5C5" font-family="'Segoe UI', Arial, sans-serif" font-size="22">Queue debugger requests from the web UI, sync findings from the VM,</text>
  <text x="720" y="542" fill="#8FB5C5" font-family="'Segoe UI', Arial, sans-serif" font-size="22">and keep the full operator trail attached to the same analysis job.</text>

