  <text x="106" y="354" fill="#8FB5C5" font-family="'Segoe UI', Arial, sans-serif" font-size="27">AI reverse engineering workbench for triage, decompilation,</text>
  <text x="106" y="390" fill="#8FB5C5" font-family="'Segoe UI', Arial, sans-serif" font-size="27">debugger-aware workflows, and a reproducible Windows lab.</text>

